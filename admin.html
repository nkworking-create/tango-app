<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango 管理画面</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0c0020; --card: #17002e; --border: #2a1050;
    --text: #ede8ff; --sub: #9580b8;
    --accent: #7c3aed; --accent-light: rgba(124,58,237,.15);
    --green: #10b981; --green-bg: rgba(16,185,129,.1);
    --red: #f43f5e; --red-bg: rgba(244,63,94,.1);
    --font: -apple-system, 'Noto Sans JP', sans-serif;
  }
  body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

  /* ── Login ── */
  #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
  .login-card { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 40px 32px; width: 100%; max-width: 360px; text-align: center; box-shadow: 0 16px 48px rgba(0,0,0,.4); }
  .login-logo { font-size: 28px; font-weight: 900; letter-spacing: -.02em; margin-bottom: 6px; }
  .login-sub { font-size: 13px; color: var(--sub); margin-bottom: 32px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--sub); text-align: left; margin-bottom: 6px; letter-spacing: .04em; }
  .field-input { width: 100%; background: rgba(255,255,255,.05); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px; font-size: 15px; color: var(--text); font-family: var(--font); margin-bottom: 20px; outline: none; transition: border-color .2s; }
  .field-input:focus { border-color: var(--accent); }
  .login-btn { width: 100%; background: linear-gradient(135deg,#5b4cf5,#8b5cf6); color: #fff; border: none; border-radius: 14px; padding: 15px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: var(--font); box-shadow: 0 4px 20px rgba(91,76,245,.35); transition: opacity .15s; }
  .login-btn:active { opacity: .85; }
  .login-error { color: var(--red); font-size: 13px; margin-top: 12px; }

  /* ── Layout ── */
  #admin-screen { display: none; }
  .admin-header { background: var(--card); border-bottom: 1px solid var(--border); padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
  .admin-title { font-size: 17px; font-weight: 800; }
  .admin-logout { background: none; border: 1.5px solid var(--border); border-radius: 10px; padding: 6px 14px; font-size: 13px; font-weight: 700; color: var(--sub); cursor: pointer; font-family: var(--font); transition: all .15s; }
  .admin-logout:hover { border-color: var(--red); color: var(--red); }
  .admin-body { padding: 24px; max-width: 800px; margin: 0 auto; display: flex; flex-direction: column; gap: 20px; }

  /* ── Section ── */
  .section { background: var(--card); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .section-header { padding: 18px 20px 0; display: flex; align-items: center; justify-content: space-between; }
  .section-title { font-size: 14px; font-weight: 800; letter-spacing: .04em; text-transform: uppercase; color: var(--sub); }
  .section-body { padding: 16px 20px 20px; }

  /* ── Stats grid ── */
  .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .stat-card { background: var(--accent-light); border: 1px solid rgba(124,58,237,.2); border-radius: 14px; padding: 16px; text-align: center; }
  .stat-num { font-size: 28px; font-weight: 900; color: #c4b5fd; letter-spacing: -.02em; }
  .stat-label { font-size: 11px; color: var(--sub); font-weight: 700; margin-top: 4px; }

  /* ── Toggle ── */
  .toggle-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--border); }
  .toggle-row:last-child { border-bottom: none; padding-bottom: 0; }
  .toggle-info { flex: 1; }
  .toggle-name { font-size: 15px; font-weight: 700; }
  .toggle-desc { font-size: 12px; color: var(--sub); margin-top: 3px; }
  .toggle-switch { position: relative; width: 50px; height: 28px; flex-shrink: 0; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-track { position: absolute; inset: 0; border-radius: 99px; background: var(--border); cursor: pointer; transition: background .2s; }
  .toggle-track::before { content: ''; position: absolute; width: 22px; height: 22px; border-radius: 50%; background: #fff; top: 3px; left: 3px; transition: transform .2s; }
  input:checked + .toggle-track { background: var(--green); }
  input:checked + .toggle-track::before { transform: translateX(22px); }

  /* ── Table ── */
  .data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .data-table th { text-align: left; padding: 8px 10px; font-size: 11px; font-weight: 800; color: var(--sub); letter-spacing: .04em; text-transform: uppercase; border-bottom: 1px solid var(--border); }
  .data-table td { padding: 11px 10px; border-bottom: 1px solid rgba(42,16,80,.5); vertical-align: middle; }
  .data-table tr:last-child td { border-bottom: none; }
  .data-table tr:hover td { background: rgba(124,58,237,.05); }
  .del-btn-sm { background: var(--red-bg); border: 1px solid rgba(244,63,94,.3); color: var(--red); border-radius: 8px; padding: 4px 10px; font-size: 12px; font-weight: 700; cursor: pointer; font-family: var(--font); transition: all .15s; }
  .del-btn-sm:hover { background: rgba(244,63,94,.2); }
  .badge { font-size: 10px; font-weight: 800; border-radius: 6px; padding: 2px 7px; }
  .badge-green { background: var(--green-bg); color: var(--green); }
  .badge-sub { background: var(--accent-light); color: #c4b5fd; }

  /* ── API key ── */
  .key-row { display: flex; gap: 10px; }
  .key-input { flex: 1; background: rgba(255,255,255,.05); border: 1.5px solid var(--border); border-radius: 12px; padding: 12px 14px; font-size: 14px; color: var(--text); font-family: var(--font); outline: none; }
  .key-input:focus { border-color: var(--accent); }
  .save-btn { background: linear-gradient(135deg,#5b4cf5,#8b5cf6); color: #fff; border: none; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 800; cursor: pointer; font-family: var(--font); white-space: nowrap; }

  /* ── Password ── */
  .pw-row { display: flex; flex-direction: column; gap: 10px; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1e1040; border: 1px solid rgba(124,58,237,.4); color: var(--text); border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 700; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
  .toast.show { opacity: 1; }

  .empty-msg { text-align: center; color: var(--sub); font-size: 13px; padding: 24px 0; }
  .loading { text-align: center; color: var(--sub); font-size: 13px; padding: 20px; }
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">Tango</div>
    <div class="login-sub">管理者ログイン</div>
    <div class="field-label">パスワード</div>
    <input class="field-input" type="password" id="pw-input" placeholder="管理者パスワード" onkeydown="if(event.key==='Enter')login()">
    <button class="login-btn" onclick="login()">ログイン</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- 管理画面 -->
<div id="admin-screen">
  <div class="admin-header">
    <div class="admin-title">Tango 管理画面</div>
    <button class="admin-logout" onclick="logout()">ログアウト</button>
  </div>
  <div class="admin-body">

    <!-- 統計 -->
    <div class="section">
      <div class="section-header"><div class="section-title">統計</div></div>
      <div class="section-body">
        <div class="stats-grid" id="stats-grid"><div class="loading">読み込み中…</div></div>
      </div>
    </div>

    <!-- 機能フラグ -->
    <div class="section">
      <div class="section-header"><div class="section-title">機能設定</div></div>
      <div class="section-body">
        <div class="toggle-row">
          <div class="toggle-info">
            <div class="toggle-name">みんなの単語帳</div>
            <div class="toggle-desc">ONにするとユーザーにコミュニティ機能が公開されます</div>
          </div>
          <label class="toggle-switch">
            <input type="checkbox" id="community-toggle" onchange="toggleCommunity(this.checked)">
            <span class="toggle-track"></span>
          </label>
        </div>
      </div>
    </div>

    <!-- APIキー -->
    <div class="section">
      <div class="section-header"><div class="section-title">Gemini APIキー</div></div>
      <div class="section-body">
        <div class="key-row">
          <input class="key-input" type="password" id="api-key-input" placeholder="AIza...">
          <button class="save-btn" onclick="saveApiKey()">保存</button>
        </div>
      </div>
    </div>

    <!-- 管理者パスワード変更 -->
    <div class="section">
      <div class="section-header"><div class="section-title">管理者パスワード変更</div></div>
      <div class="section-body">
        <div class="pw-row">
          <input class="key-input" type="password" id="new-pw-input" placeholder="新しいパスワード">
          <button class="save-btn" onclick="changePassword()" style="width:fit-content">変更</button>
        </div>
      </div>
    </div>

    <!-- ユーザー一覧 -->
    <div class="section">
      <div class="section-header"><div class="section-title">ユーザー一覧</div></div>
      <div class="section-body">
        <div id="users-table"><div class="loading">読み込み中…</div></div>
      </div>
    </div>

    <!-- コミュニティ単語 -->
    <div class="section">
      <div class="section-header"><div class="section-title">コミュニティ単語</div></div>
      <div class="section-body">
        <div id="community-table"><div class="loading">読み込み中…</div></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let adminToken = sessionStorage.getItem('admin-token') || '';

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch('/api/admin' + path, opts);
  return res.json();
}

async function login() {
  const pw = document.getElementById('pw-input').value;
  const err = document.getElementById('login-error');
  err.textContent = '';
  try {
    const r = await fetch('/api/admin/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: pw }) });
    const d = await r.json();
    if (!d.ok) { err.textContent = d.error; return; }
    adminToken = d.token;
    sessionStorage.setItem('admin-token', adminToken);
    showAdmin();
  } catch { err.textContent = 'エラーが発生しました'; }
}

function logout() {
  adminToken = '';
  sessionStorage.removeItem('admin-token');
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
}

async function showAdmin() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('admin-screen').style.display = 'block';
  loadStats();
  loadUsers();
  loadCommunityWords();
}

async function loadStats() {
  const d = await api('GET', '/stats');
  if (d.error) { logout(); return; }
  document.getElementById('community-toggle').checked = d.communityEnabled;
  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${d.userCount}</div><div class="stat-label">ユーザー</div></div>
    <div class="stat-card"><div class="stat-num">${d.totalWords}</div><div class="stat-label">総単語数</div></div>
    <div class="stat-card"><div class="stat-num">${d.communityWordCount}</div><div class="stat-label">コミュニティ単語</div></div>
  `;
}

async function loadUsers() {
  const users = await api('GET', '/users');
  if (!Array.isArray(users)) { document.getElementById('users-table').innerHTML = '<div class="empty-msg">読み込みエラー</div>'; return; }
  if (users.length === 0) { document.getElementById('users-table').innerHTML = '<div class="empty-msg">ユーザーはいません</div>'; return; }
  document.getElementById('users-table').innerHTML = `
    <table class="data-table">
      <thead><tr><th>名前</th><th>メールアドレス</th><th>登録日</th><th>データ</th><th></th></tr></thead>
      <tbody>${users.map(u => `
        <tr>
          <td>${esc(u.name)}</td>
          <td style="color:var(--sub)">${esc(u.email)}</td>
          <td style="color:var(--sub);font-size:12px">${new Date(u.createdAt).toLocaleDateString('ja-JP')}</td>
          <td>${u.hasData ? '<span class="badge badge-green">あり</span>' : '<span class="badge badge-sub">なし</span>'}</td>
          <td><button class="del-btn-sm" onclick="deleteUser('${u.id}','${esc(u.name)}')">削除</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function loadCommunityWords() {
  const words = await api('GET', '/community-words');
  if (!Array.isArray(words)) { document.getElementById('community-table').innerHTML = '<div class="empty-msg">読み込みエラー</div>'; return; }
  if (words.length === 0) { document.getElementById('community-table').innerHTML = '<div class="empty-msg">データなし</div>'; return; }
  document.getElementById('community-table').innerHTML = `
    <table class="data-table">
      <thead><tr><th>英語</th><th>日本語</th><th>検索数</th><th></th></tr></thead>
      <tbody>${words.slice(0, 50).map(w => `
        <tr>
          <td style="font-weight:700">${esc(w.en)}</td>
          <td style="color:var(--sub)">${esc(w.ja)}</td>
          <td style="color:var(--sub)">${w.count}</td>
          <td><button class="del-btn-sm" onclick="deleteCommunityWord('${esc(w.en)}')">削除</button></td>
        </tr>`).join('')}
      </tbody>
    </table>`;
}

async function toggleCommunity(enabled) {
  await api('POST', '/community/toggle', { enabled });
  showToast(enabled ? 'コミュニティを公開しました' : 'コミュニティを非公開にしました');
}

async function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) { showToast('キーを入力してください'); return; }
  await api('POST', '/key-auth', { key });
  showToast('APIキーを保存しました');
  document.getElementById('api-key-input').value = '';
}

async function changePassword() {
  const pw = document.getElementById('new-pw-input').value.trim();
  if (pw.length < 6) { showToast('6文字以上で入力してください'); return; }
  await api('POST', '/password', { password: pw });
  showToast('パスワードを変更しました');
  document.getElementById('new-pw-input').value = '';
}

async function deleteUser(id, name) {
  if (!confirm(`「${name}」を削除しますか？この操作は取り消せません。`)) return;
  await api('DELETE', '/users/' + id);
  showToast('削除しました');
  loadUsers();
  loadStats();
}

async function deleteCommunityWord(en) {
  if (!confirm(`「${en}」を削除しますか？`)) return;
  await api('DELETE', '/community/word/' + encodeURIComponent(en));
  showToast('削除しました');
  loadCommunityWords();
  loadStats();
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// 起動時にトークンがあれば自動ログイン
if (adminToken) showAdmin();
</script>
</body>
</html>
